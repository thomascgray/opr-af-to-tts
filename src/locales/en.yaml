    text: "If you find any bugs, please report them on the <0>github issues page</0>. Thanks!"
  armyShareLink:
    label: "Army Forge Share Link"
    # <0> = link to Army Forge, <1> = link to the TTS mod on Steam
    tldr: 'tl;dr: go to <0>Army Forge</0> → army listing → menu at the top right → click "Share as Link" → paste that link into the box below → define model definitions → hit "Generate shareable link for TTS" at the bottom of the screen → paste <em>that</em> URL into <1>this mod</1>'
    placeholder: "https://army-forge.onepagerules.com/share?id=XXX&name=XXX"
  importArmyButton: "Import Army & Generate Definitions"
  inlineOptions:
    legend: "Inline Options"
    toggleAllLoadouts: "Check to toggle ALL loadout items to be included in the model name"
  unit:
    modelCount_one: "{{count}} model"
    modelCount_other: "{{count}} models"
    joinedTo: "joined to"
    combinedWith: "combined with"
    originalLoadoutLabel: "Original Unit Loadout: {{loadout}}"
  model:
    definitionLabel: "Model Definition {{n}}"
    deleteTitle: "Delete this distinct model definition"
    quantityPerModelLabel: "Qty per. model"
    quantityPerModelTitle: "Quantity of this item per model"
    includeInNameTitle: "Check to include this item in the model name"
    duplicateButton: "Duplicate this model definition"
    campaignTraits:
      heading: "Campaign Traits"
      skillSets: "Skill Sets"
      traits: "Traits"
      injuries: "Injuries"
      talents: "Talents"
      toggleTitle: "Include Campaign Trait > {{category}} > {{name}} in model description"
  ttsPreview:
    label: "TTS output preview (name and description)"
  shareable:
    generateButton: "Generate shareable link for TTS"
    copyPasteHint: "Copy and paste the link below into the TTS mod"

tutorial:
  header: "How-To / Tutorial"
  instructions:
    item1: "Build your army in OPR's Army Forge."
    item2: 'Click the menu at the top right of that page and hit "Share as Link".'
    item3: "Paste that link into the box above on this page."
    item4: 'Click "Import Army & Generate Definitions" above.'
    item5: "This app will then build a model definition for each unit in your army."
    item6: "It's then up to you to then assign quantities of loadout items onto your model, as per your desired army:"
    item6a: "Change the quantity of a model's loadout items using the inputs on the left."
    item6b: "Check the box next to a loadout item's quantity to have that item name be present in the model's TTS name."
    item6c: 'Duplicate any model definition using the "Duplicate this model definition" button.'
    # <0> = link to the TTS mod on Steam
    item7: 'Once you''re done, hit "Generate shareable link for TTS" at the bottom, and then paste that URL into <0>the TTS mod</0>.'
  hint:
    label: "Hint"
    text: 'Check the "TTS Output Configuration" options below to adjust what is included in each model''s name and description fields in TTS.'

outputOptions:
  header: "TTS Output Configuration"
  rules:
    includeCoreSpecialRules:
      name: 'Include "Core" special rules in model description'
      label: 'If enabled, the TTS "description" outputs will include the model''s relevant core special rules.'
    includeFullCoreSpecialRulesText:
      name: "Include the full text for core special rules"
      label: 'If enabled, the TTS "description" outputs will include the model''s relevant core special rules text in full. If disabled, only the special rule''s name will be included.'
    includeArmySpecialRules:
      name: 'Include "Army" special rules in model description'
      label: 'If enabled, the TTS "description" outputs will include the model''s relevant rules from the army, and from that model''s loadout.'
    includeFullArmySpecialRulesText:
      name: "Include the full text for army special rules"
      label: 'If enabled, the TTS "description" outputs will include the model''s relevant army special rules text in full. If disabled, only the special rule''s name will be included.'
    includeWeaponsListInName:
      name: 'Include "Loadout List" in model name'
      label: 'If enabled, the TTS "name" output will include a comma separated, colour coded list of the model''s equipped loadout under the model''s name.'
    includeSpecialRulesListInName:
      name: 'Include "Special Rules List" in model name'
      label: 'If enabled, the TTS "name" output will include a comma separated, colour coded list of the model''s relevant special rules under the model''s name.'
    swapCustomName:
      name: "Swap custom name and original name ordering for units with multiple models in them"
      label: "If enabled, then a unit with a custom name and whose original model size is greater than 1 will have the custom name in the brackets in the output, instead of the original name. This often looks better and makes more semantic sense."
    replaceOriginalName:
      name: "Completely replace original model names with any custom name"
      label: "If enabled, then a unit with a custom name will have that custom name completely replace the original, with the original not being in brackets or anywhere else on the model."
    disableSmallText:
      name: "Disable small text"
      label: "If enabled, then none of the text in the name or description will be small. Enable this if you have trouble reading the small text in TTS."
    includeCampaignTraits:
      name: "Include campaign traits in model description"
      label: 'If enabled, the TTS "description" output will include each of the model''s campaign traits (Skill Sets, Traits, Injuries, Talents). This is the master switch — the per-category toggles below, and the per-trait checkboxes in the editor, further refine what is shown.'
    includeCampaignTraitsFullText:
      name: "Include the full text for campaign traits"
      label: 'If enabled, the TTS "description" output will include each campaign trait''s rule text in full. If disabled, only the trait''s name will be included.'
    includeCampaignSkillSets:
      name: "Include Campaign Skill Sets"
      label: "If enabled, campaign traits in the Skill Sets category (e.g. Suppressor, Prowler) are included in the model description."
    includeCampaignTraitsCategory:
      name: "Include Campaign Traits"
      label: "If enabled, campaign traits in the Traits category (e.g. Agile, Resilient) are included in the model description."
    includeCampaignInjuries:
      name: "Include Campaign Injuries"
      label: "If enabled, campaign injuries (e.g. Blinded Eye, Chest Wound) are included in the model description."
    includeCampaignTalents:
      name: "Include Campaign Talents"
      label: "If enabled, campaign talents (e.g. Natural Talent) are included in the model description."
    includeCampaignXp:
      name: "Include Campaign XP in model description"
      label: 'If enabled, the TTS "description" output ends with the model''s current campaign XP. Models with 0 XP have nothing added.'
  colours:
    quality:
      name: "Model Quality Stat Output Colour"
      label: "HEX code for the model's quality value in the TTS output."
    defense:
      name: "Model Defense Stat Output Colour"
      label: "HEX code for the model's defense value in the TTS output."
    loadout:
      name: "Model Loadout Output Colour"
      label: "HEX code for the model's loadouts details in the TTS output."
    specialRules:
      name: "Model Special Rules Output Colour"
      label: "HEX code for the model's special rules details in the TTS output."
    tough:
      name: "Model Tough Special Rule Rating Output Colour"
      label: "HEX code for the model's Tough rating, if it has one, in the TTS output."
    campaign:
      name: "Model Campaign Stuff Output Colour"
      label: "HEX code for the model's campaign traits and campaign XP line in the TTS output."
  saveLoad:
    header: "Save & Load TTS Output Configs"
    description: "Save all of the above configuration into the local storage of your browser by hitting the button below. You can then quickly load different configs by hitting the load buttons below."
    saveButton: "Save Current Config"
    loadDefaultButton: "Load app default config"
    loadCustomHeader: "Load Custom Configs"
    loadConfigButton: "Load Config"
    emptyState: "You have no saved TTS output configs"

outputFaq:
  header: "TTS Output Notes"
  unitUpgradesNote: 'Special upgrades that apply specifically to entire units (such as Age of Fantasy "Musician" upgrades) are listed as individual loadout items here. While this isn''t technically perfect, it''s the best compromise, and still allows the most flexibility.'

inGameEnhancements:
  header: "In-Game Enhancements"
  intro: "Once you've imported your shareable link into the TTS mod and assigned a model definition to a TTS object, that object gains a bunch of extra in-game features for tracking HP, spell tokens, status effects, measuring distances, and visually grouping unit mates. Here's everything that becomes available."
  statBars:
    heading: "Floating Stat Bars"
    body: "Each assigned model gets a small panel that floats above it showing its current state. Each bar has inline [-] and [+] buttons either side of the text for quick adjustments without opening the full menu."
    item1: "HP bar (red) — shows current/max wounds. Max is the model's Tough value (or Tough + 5 in skirmish systems)."
    item2: "SP bar (blue) — shows current/6 spell tokens, only for caster models."
    item3: "Measuring readout — appears when a measuring ring is active, showing the current radius in inches. Coloured to match the ring."
  contextMenu:
    heading: "Right-Click Context Menu"
    body: "Right-click any assigned model for these entries:"
    toggleMenu:
      name: "Toggle Menu"
      desc: "Opens or closes the floating action panel above the model. Only one menu in a given army can be open at a time — opening one closes any other."
    activated:
      name: "Activated"
      desc: "Toggles the unit's activation state. Affects every model in the unit (a green ring appears around each)."
    shakenStunned:
      name: "Shaken / Stunned"
      desc: "Unit-wide status toggle. \"Shaken\" appears for Grimdark Future / Age of Fantasy / Age of Fantasy Regiments armies (yellow pentagon); \"Stunned\" appears for Grimdark Future Firefight / Age of Fantasy Skirmish armies (red hexagon)."
    measuring:
      name: "Measuring"
      desc: "Cycles a white measuring ring around the model through 3″, 6″, 9″, 12″, 18″, 24″, 30″ and off."
  hotkeys:
    heading: "Hover Hotkeys (Scripting Keys)"
    body: "While hovering your cursor over an assigned model, the TTS scripting number keys 1–6 act on that model. No need to pick it up or right-click — just hover and tap."
    col:
      key: "Key"
      action: "Action"
      notes: "Notes"
    row1:
      action: "Toggle action panel"
      notes: "Same as the right-click \"Toggle Menu\" entry."
    row2:
      action: "HP −1"
      notes: "Only on models with Tough (or any model in a skirmish system)."
    row3:
      action: "HP +1"
      notes: "Only on models with Tough (or any model in a skirmish system)."
    row4:
      action: "SP −1"
      notes: "Only on caster models."
    row5:
      action: "SP +1"
      notes: "Only on caster models."
    row6:
      action: "Cycle measuring radius"
      notes: "Same cycle as the right-click \"Measuring\" entry."
    libraryNote: "These hotkeys live on the model itself, so they keep working even if you save the assigned model into your personal TTS object library and load it into a different map that doesn't have the mod."
  actionPanel:
    heading: "Floating Action Panel"
    body: "Opening the menu reveals a button panel above the model with everything below. Click the red X in the top-right to close it — none of the action buttons themselves close the panel, so you can chain operations freely."
    columns:
      heading: "Three columns of actions:"
      model:
        name: "Model"
        desc: "HP +/−, SP +/−, cycle Measuring radius, turn Measuring off."
      unit:
        name: "Unit"
        desc: "Activated, Shaken or Stunned, Select All (selects every model in the unit), Count (announces how many models remain)."
      army:
        name: "Army"
        desc: "Measuring Off (clears every measuring ring across the army), Deactivate (clears activation across the army), Refresh Spells (each caster gains its per-turn token allowance, capped at 6)."
    extras:
      heading: "Plus four further sections beneath the columns:"
      ringColour:
        name: "Measuring Ring Colour"
        desc: "Two rows of eight colour swatches (light + dark variants). Recolours the unit's measuring ring and the matching readout in the floating stat bars. Applies to every model in the unit."
      highlight:
        name: "Unit Highlight"
        desc: "Same palette, but applies a persistent TTS object highlight (a glow around the base) to every model in the unit. Use it to keep track of which unit is which on a busy table. \"Clear Highlight\" removes it."
      uiVisibility:
        name: "Floating UI Visibility"
        desc: "Per-Model and per-Unit toggles for the HP bar, SP bar, and Measure Distance Indicator. Hide stats you aren't tracking to keep the table tidy."
      uiPosition:
        name: "Model Floating UI Position"
        desc: "Up / Down nudge the floating UI vertically (handy for tall models or large bases). Left / Right rotate it around the vertical axis so it always faces you."
    closeNote: "Tip: only one action panel per army can be open at a time. Opening another model's menu automatically closes the previous one."

maintenance:
  heading: "OPR Army Forge to TTS is under maintenance!"
  body: "Site is currently under construction, please check back soon!"

errors:
  # These are surfaced via alert(). The raw API error payload, when present, is appended as-is
  # (untranslated) because it originates from the Army Forge API.
  noArmyId: "Could not find an Army Forge army ID. Please double check your Army Forge share link and try again."
  armyForgeExportFailed: "Army Forge failed to export list. Sorry!"
  fetchCommonRulesFailed: "Failed to fetch common rules. Sorry!"
