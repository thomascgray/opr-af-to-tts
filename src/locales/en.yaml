# English translations — source of truth.
# Other locales fall back to en for missing keys (see src/i18n/index.ts).
#
# Keep keys organised by component/area. Leaf values are strings.
# Interpolation uses {{variableName}}. Rich-text (embedded JSX) uses <0>, <1>, … placeholders
# rendered via react-i18next's <Trans> component.

