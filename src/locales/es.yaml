tutorial:
  header: "Guía / Tutorial"
  instructions:
    item1: "Construye tu ejército en OPR's Army Forge."
    item2: 'Haz clic en el menú arriba a la derecha y selecciona "Share as Link".'
    item3: "Pega ese enlace en el campo de arriba."
    item4: 'Haz clic en "Importar ejército y generar definiciones" arriba.'
    item5: "La aplicación creará entonces una definición de modelo para cada unidad de tu ejército."
    item6: "Luego depende de ti asignar las cantidades de equipos a cada modelo, según el ejército que quieras:"
    item6a: "Cambia la cantidad de un equipo usando los campos de la izquierda."
    item6b: "Marca la casilla junto a la cantidad de un equipo para que su nombre aparezca en el nombre TTS del modelo."
    item6c: 'Duplica cualquier definición de modelo con el botón "Duplicar esta definición de modelo".'
    # <0> = enlace al mod de TTS
    item7: 'Cuando termines, haz clic en "Generar enlace compartible para TTS" al final, y luego pega esa URL en <0>el mod de TTS</0>.'
  hint:
    label: "Consejo"
    text: 'Usa las opciones de "TTS Output Configuration" a continuación para ajustar qué aparece en los campos de nombre y descripción de cada modelo en TTS.'

outputOptions:
  header: "Configuración de salida TTS"
  rules:
    includeCoreSpecialRules:
      name: 'Incluir reglas especiales "Core" en la descripción del modelo'
      label: "Si está activado, las descripciones TTS incluirán las reglas especiales core relevantes del modelo."
    includeFullCoreSpecialRulesText:
      name: "Incluir el texto completo de las reglas especiales core"
      label: "Si está activado, las descripciones TTS incluirán el texto completo de las reglas especiales core. Si no, solo se mostrará el nombre de la regla."
    includeArmySpecialRules:
      name: 'Incluir reglas especiales "Army" en la descripción del modelo'
      label: "Si está activado, las descripciones TTS incluirán las reglas relevantes del ejército y del equipamiento del modelo."
    includeFullArmySpecialRulesText:
      name: "Incluir el texto completo de las reglas especiales de ejército"
      label: "Si está activado, las descripciones TTS incluirán el texto completo de las reglas especiales de ejército. Si no, solo se mostrará el nombre de la regla."
    includeWeaponsListInName:
      name: 'Incluir "lista de equipamiento" en el nombre del modelo'
      label: 'Si está activado, la salida "nombre" TTS incluirá una lista de equipamiento separada por comas y con colores bajo el nombre del modelo.'
    includeSpecialRulesListInName:
      name: 'Incluir "lista de reglas especiales" en el nombre del modelo'
      label: 'Si está activado, la salida "nombre" TTS incluirá una lista de reglas especiales separada por comas y con colores bajo el nombre del modelo.'
    swapCustomName:
      name: "Invertir el orden del nombre personalizado y el nombre original en unidades con varios modelos"
      label: "Si está activado, una unidad con nombre personalizado y más de un modelo original mostrará el nombre personalizado entre paréntesis en lugar del original. Suele verse mejor y tener más sentido."
    replaceOriginalName:
      name: "Reemplazar completamente el nombre original por el nombre personalizado"
      label: "Si está activado, una unidad con nombre personalizado tendrá ese nombre reemplazando completamente al original, sin paréntesis ni en otros lugares del modelo."
    disableSmallText:
      name: "Desactivar texto pequeño"
      label: "Si está activado, ningún texto del nombre o descripción será pequeño. Actívalo si te cuesta leer el texto pequeño en TTS."
    includeCampaignTraits:
      name: "Incluir rasgos de campaña en la descripción del modelo"
      label: "Si está activado, la descripción TTS incluirá los rasgos de campaña del modelo (Habilidades, Rasgos, Heridas, Talentos). Este es el interruptor principal — las subcategorías de abajo y las casillas por rasgo afinan la salida."
    includeCampaignTraitsFullText:
      name: "Incluir el texto completo de los rasgos de campaña"
      label: "Si está activado, la descripción TTS incluirá el texto completo de cada rasgo de campaña. Si no, solo se mostrará el nombre del rasgo."
    includeCampaignSkillSets:
      name: "Incluir Habilidades de campaña"
      label: "Si está activado, los rasgos de la categoría Habilidades (p. ej. Suppressor, Prowler) se incluyen en la descripción del modelo."
    includeCampaignTraitsCategory:
      name: "Incluir Rasgos de campaña"
      label: "Si está activado, los rasgos de la categoría Rasgos (p. ej. Agile, Resilient) se incluyen en la descripción del modelo."
    includeCampaignInjuries:
      name: "Incluir Heridas de campaña"
      label: "Si está activado, las heridas de campaña (p. ej. Blinded Eye, Chest Wound) se incluyen en la descripción del modelo."
    includeCampaignTalents:
      name: "Incluir Talentos de campaña"
      label: "Si está activado, los talentos de campaña (p. ej. Natural Talent) se incluyen en la descripción del modelo."
    includeCampaignXp:
      name: "Incluir XP de campaña en la descripción del modelo"
      label: "Si está activado, la descripción TTS termina con la XP de campaña actual del modelo. Modelos con 0 XP no reciben ninguna línea."
  colours:
    quality:
      name: "Color de salida de la calidad del modelo"
      label: "Código HEX para el valor de calidad del modelo en la salida TTS."
    defense:
      name: "Color de salida de la defensa del modelo"
      label: "Código HEX para el valor de defensa del modelo en la salida TTS."
    loadout:
      name: "Color de salida del equipamiento del modelo"
      label: "Código HEX para los detalles del equipamiento del modelo en la salida TTS."
    specialRules:
      name: "Color de salida de las reglas especiales del modelo"
      label: "Código HEX para los detalles de las reglas especiales del modelo en la salida TTS."
    tough:
      name: "Color de salida del valor Tough del modelo"
      label: "Código HEX para el valor Tough del modelo, si lo tiene, en la salida TTS."
    campaign:
      name: "Color de salida de los elementos de campaña"
      label: "Código HEX para los rasgos de campaña y la XP de campaña del modelo en la salida TTS."
  saveLoad:
    header: "Guardar y cargar configuraciones de salida TTS"
    description: "Guarda toda la configuración anterior en el almacenamiento local de tu navegador haciendo clic en el botón de abajo. Luego podrás cargar rápidamente diferentes configuraciones."
    saveButton: "Guardar configuración actual"
    loadDefaultButton: "Cargar configuración por defecto"
    loadCustomHeader: "Cargar configuraciones personalizadas"
    loadConfigButton: "Cargar configuración"
    emptyState: "No tienes configuraciones de salida TTS guardadas"

outputFaq:
  header: "Notas sobre la salida TTS"
  unitUpgradesNote: 'Las mejoras que se aplican a unidades completas (como las mejoras "Musician" en Age of Fantasy) se listan aquí como objetos de equipamiento individuales. No es técnicamente perfecto, pero es el mejor compromiso y ofrece la máxima flexibilidad.'

maintenance:
  heading: "¡OPR Army Forge a TTS está en mantenimiento!"
  body: "El sitio está en obras, ¡vuelve pronto!"

