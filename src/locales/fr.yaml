tutorial:
  header: "Guide / Tutoriel"
  instructions:
    item1: "Construisez votre armée dans OPR's Army Forge."
    item2: 'Cliquez sur le menu en haut à droite et sélectionnez "Share as Link".'
    item3: "Collez ce lien dans le champ ci-dessus."
    item4: 'Cliquez sur "Importer l''armée et générer les définitions" ci-dessus.'
    item5: "L'application va alors créer une définition de la figurine pour chaque unité de votre armée."
    item6: "À vous ensuite d'assigner les quantités d'équipements à chaque figurine, selon l'armée souhaitée :"
    item6a: "Modifiez la quantité d'un équipement à l'aide des champs de gauche."
    item6b: "Cochez la case à côté de la quantité d'un équipement pour que son nom apparaisse dans le nom TTS de la figurine."
    item6c: 'Dupliquez n''importe quelle définition de la figurine via le bouton "Dupliquer cette définition de la figurine".'
    # <0> = lien vers le mod TTS
    item7: 'Une fois terminé, cliquez sur "Générer un lien partageable pour TTS" en bas de page, puis collez cette URL dans <0>le mod TTS</0>.'
  hint:
    label: "Astuce"
    text: 'Utilisez les options de "TTS Output Configuration" ci-dessous pour ajuster ce qui apparaît dans les champs nom et description de chaque figurine dans TTS.'

outputOptions:
  header: "Configuration de la sortie TTS"
  rules:
    includeCoreSpecialRules:
      name: "Inclure les règles spéciales de base dans la description de la figurine"
      label: "Si activé, les descriptions TTS incluront les règles spéciales de base pertinentes pour chaque figurine."
    includeFullCoreSpecialRulesText:
      name: "Inclure le texte complet des règles spéciales de base"
      label: "Si activé, les descriptions TTS incluront le texte complet des règles spéciales de base. Sinon, seul le nom de la règle sera affiché."
    includeArmySpecialRules:
      name: "Inclure les règles spéciales d'armée dans la description de la figurine"
      label: "Si activé, les descriptions TTS incluront les règles de l'armée et de l'équipement de la figurine."
    includeFullArmySpecialRulesText:
      name: "Inclure le texte complet des règles spéciales d'armée"
      label: "Si activé, les descriptions TTS incluront le texte complet des règles spéciales d'armée. Sinon, seul le nom de la règle sera affiché."
    includeWeaponsListInName:
      name: "Inclure la liste des équipements dans le nom de la figurine"
      label: 'Si activé, la sortie "nom" TTS inclura une liste d''équipements séparée par des virgules et colorée sous le nom de la figurine.'
    includeSpecialRulesListInName:
      name: "Inclure la liste des règles spéciales dans le nom de la figurine"
      label: 'Si activé, la sortie "nom" TTS inclura une liste des règles spéciales séparée par des virgules et colorée sous le nom de la figurine.'
    swapCustomName:
      name: "Inverser l'ordre du nom personnalisé et du nom d'origine pour les unités à plusieurs figurines"
      label: "Si activé, une unité avec un nom personnalisé dont la taille d'origine est supérieur à 1 affichera le nom personnalisé entre parenthèses au lieu du nom d'origine. C'est souvent plus lisible et plus logique."
    replaceOriginalName:
      name: "Remplacer complètement le nom d'origine par le nom personnalisé"
      label: "Si activé, une unité avec un nom personnalisé verra ce nom remplacer entièrement l'original, sans référence au nom de la figurine de base."
    disableSmallText:
      name: "Désactiver le texte en petit"
      label: "Si activé, aucun texte du nom ou de la description ne sera en petit. Activez cette option si vous avez du mal à lire le petit texte dans TTS."
    includeCampaignTraits:
      name: "Inclure les traits de campagne dans la description de la figurine"
      label: "Si activé, la description TTS inclura chacun des traits de campagne de la figurine (Compétences, Traits, Blessures, Talents). C'est l'option principale — les sous-catégories ci-dessous et les cases à cocher par trait affineront la sortie."
    includeCampaignTraitsFullText:
      name: "Inclure le texte complet des traits de campagne"
      label: "Si activé, la description TTS inclura le texte complet de chaque trait de campagne. Sinon, seul le nom du trait sera affiché."
    includeCampaignSkillSets:
      name: "Inclure les Compétences de campagne"
      label: "Si activé, les traits de campagne de la catégorie Compétences (p. ex. Suppressor, Prowler) seront inclus dans la description de la figurine."
    includeCampaignTraitsCategory:
      name: "Inclure les Traits de campagne"
      label: "Si activé, les traits de campagne de la catégorie Traits (p. ex. Agile, Resilient) seront inclus dans la description de la figurine."
    includeCampaignInjuries:
      name: "Inclure les Blessures de campagne"
      label: "Si activé, les blessures de campagne (p. ex. Blinded Eye, Chest Wound) seront incluses dans la description de la figurine."
    includeCampaignTalents:
      name: "Inclure les Talents de campagne"
      label: "Si activé, les talents de campagne (p. ex. Natural Talent) seront inclus dans la description de la figurine."
    includeCampaignXp:
      name: "Inclure l'XP de campagne dans la description de la figurine"
      label: "Si activé, la description TTS se terminera par l'XP de campagne actuelle de la figurine. Les figurines avec 0 XP n'auront aucune ligne ajoutée."
  colours:
    quality:
      name: "Couleur de la Qualité de la figurine"
      label: "Code HEX pour la valeur de Qualité de la figurine dans la sortie TTS."
    defense:
      name: "Couleur de la Défense de la figurine"
      label: "Code HEX pour la valeur de Défense de la figurine dans la sortie TTS."
    loadout:
      name: "Couleur de l'équipement de la figurine"
      label: "Code HEX pour les détails d'équipement de la figurine dans la sortie TTS."
    specialRules:
      name: "Couleur des règles spéciales de la figurine"
      label: "Code HEX pour les détails des règles spéciales de la figurine dans la sortie TTS."
    tough:
      name: "Couleur de la valeur Tough de la figurine"
      label: "Code HEX pour la valeur Tough de la figurine, le cas échéant, dans la sortie TTS."
    campaign:
      name: "Couleur des éléments de campagne"
      label: "Code HEX pour les traits de campagne et l'XP de campagne de la figurine dans la sortie TTS."
  saveLoad:
    header: "Enregistrer et charger les configurations TTS"
    description: "Enregistrez toute la configuration ci-dessus dans le stockage local de votre navigateur en cliquant sur le bouton ci-dessous. Vous pourrez ensuite rapidement charger différentes configurations."
    saveButton: "Enregistrer la configuration actuelle"
    loadDefaultButton: "Charger la configuration par défaut"
    loadCustomHeader: "Charger des configurations personnalisées"
    loadConfigButton: "Charger la configuration"
    emptyState: "Aucune configuration TTS enregistrée"

outputFaq:
  header: "Notes sur la sortie TTS"
  unitUpgradesNote: 'Les améliorations qui s''appliquent à des unités entières (comme les améliorations "Musician" dans Age of Fantasy) sont listées ici comme des équipements individuels. Ce n''est pas techniquement parfait, mais c''est le meilleur compromis et cela offre le plus de flexibilité.'

inGameEnhancements:
  header: "Améliorations en jeu"
  intro: "Une fois que vous avez importé votre lien partageable dans le mod TTS et assigné une définition pour la figurine à un objet TTS, cet objet bénéficie de nombreuses fonctionnalités supplémentaires en jeu pour suivre les PV, les jetons de sort, les états, mesurer les distances et regrouper visuellement les figurines d'une même unité. Voici tout ce qui devient disponible."
  statBars:
    heading: "Barres d'état flottantes"
    body: "Chaque figurine assignée reçoit un petit panneau flottant au-dessus de lui qui affiche son état actuel. Chaque barre dispose de boutons [-] et [+] de chaque côté du texte pour des ajustements rapides sans ouvrir le menu complet."
    item1: "Barre de PV (rouge) — affiche les blessures actuelles/maximales. Le maximum est la valeur Tough du modèle (ou Tough + 5 dans les systèmes Skirmish)."
    item2: "Barre de SP (bleue) — affiche les jetons de sort actuels/6, uniquement pour les figurines lanceuses de sorts."
    item3: "Indicateur de mesure — apparaît lorsqu'un cercle de mesure est actif et affiche le rayon en pouces. Coloré pour correspondre au cercle."
  contextMenu:
    heading: "Menu contextuel (clic droit)"
    body: "Faites un clic droit sur une figurine assignée pour accéder à ces entrées :"
    toggleMenu:
      name: "Toggle Menu"
      desc: "Ouvre ou ferme le panneau d'actions flottant au-dessus de la figurine. Un seul menu peut être ouvert par armée à la fois — en ouvrir un ferme automatiquement les autres."
    activated:
      name: "Activated"
      desc: "Bascule l'état d'activation de l'unité. Affecte toutes les figurines de l'unité (un anneau vert apparaît autour de chacune)."
    shakenStunned:
      name: "Shaken / Stunned"
      desc: 'Bascule de l''état d''unité. "Shaken" apparaît pour les armées Grimdark Future / Age of Fantasy / Age of Fantasy Regiments (pentagone jaune) ; "Stunned" apparaît pour les armées Grimdark Future Firefight / Age of Fantasy Skirmish (hexagone rouge).'
    measuring:
      name: "Measuring"
      desc: "Fait défiler un anneau de mesure blanc autour de la figurine aux distances 3″, 6″, 9″, 12″, 18″, 24″, 30″, puis le désactive."
  hotkeys:
    heading: "Raccourcis au survol (Scripting Keys)"
    body: "Lorsque vous survolez une figurine assignée avec votre curseur, les touches de script TTS 1 à 6 agissent sur cette figurine. Pas besoin de le saisir ni de faire un clic droit — il suffit de survoler et d'appuyer."
    col:
      key: "Touche"
      action: "Action"
      notes: "Notes"
    row1:
      action: "Ouvrir/fermer le panneau d'actions"
      notes: 'Identique à l''entrée "Toggle Menu" du clic droit.'
    row2:
      action: "PV −1"
      notes: "Uniquement pour les figurines avec Tough (ou toute figurine d'un système Skirmish)."
    row3:
      action: "PV +1"
      notes: "Uniquement pour les figurines avec Tough (ou toute figurine d'un système Skirmish)."
    row4:
      action: "SP −1"
      notes: "Uniquement pour les figurines lanceuses de sorts."
    row5:
      action: "SP +1"
      notes: "Uniquement pour les figurines lanceuses de sorts."
    row6:
      action: "Faire défiler le rayon de mesure"
      notes: 'Même cycle que l''entrée "Measuring" du clic droit.'
    libraryNote: "Ces raccourcis sont liés à la figurine elle-même, ils continuent donc de fonctionner même si vous sauvegardez la figurine dans votre bibliothèque d'objets TTS personnelle et le chargez dans une autre map qui n'a pas le mod."
  actionPanel:
    heading: "Panneau d'actions flottant"
    body: "Ouvrir le menu fait apparaître un panneau de boutons au-dessus de la figurine avec tout ce qui suit. Cliquez sur le X rouge en haut à droite pour le fermer — aucun bouton d'action ne ferme le panneau lui-même, vous pouvez donc enchaîner les opérations librement."
    columns:
      heading: "Trois colonnes d'actions :"
      model:
        name: "Modèle"
        desc: "PV +/−, SP +/−, faire défiler le rayon de mesure, désactiver la mesure."
      unit:
        name: "Unité"
        desc: "Activated, Shaken ou Stunned, Select All (sélectionne toutes les figurines de l'unité), Count (annonce combien de figurines restent)."
      army:
        name: "Armée"
        desc: "Measuring Off (efface tous les anneaux de mesure de l'armée), Deactivate (annule l'activation de toute l'armée), Refresh Spells (chaque lanceur de sorts récupère ses jetons par tour, plafonné à 6)."
    extras:
      heading: "Plus quatre sections supplémentaires sous les colonnes :"
      ringColour:
        name: "Couleur de l'anneau de mesure"
        desc: "Deux rangées de huit échantillons de couleur (variantes claire et foncée). Recolore l'anneau de mesure de l'unité ainsi que l'indicateur correspondant dans les barres d'état flottantes. S'applique à toutes les figurines de l'unité."
      highlight:
        name: "Surbrillance d'unité"
        desc: 'Même palette, mais applique une surbrillance d''objet TTS persistante (un halo autour du socle) à chaque figurine de l''unité. Utile pour distinguer les unités sur une table chargée. "Clear Highlight" la retire.'
      uiVisibility:
        name: "Visibilité de l'UI flottante"
        desc: "Bascules par figurine et par unité l'affichage de la barre de PV, la barre de SP et l'indicateur de distance de mesure. Masquez les statistiques que vous ne suivez pas pour aérer la table."
      uiPosition:
        name: "Position de l'UI flottante du modèle"
        desc: "Up / Down déplacent l'UI flottante verticalement (pratique pour les grandes figurines ou les grosses bases). Left / Right la font pivoter autour de l'axe vertical pour qu'elle vous fasse toujours face."
    closeNote: "Astuce : un seul panneau d'actions par armée peut être ouvert à la fois. Ouvrir le menu d'une autre figurine ferme automatiquement le précédent."

maintenance:
  heading: "OPR Army Forge vers TTS est en maintenance !"
  body: "Le site est en cours de travaux, merci de revenir prochainement !"

errors:
  noArmyId: "Impossible de trouver l'identifiant d'armée Army Forge. Veuillez vérifier votre lien de partage Army Forge et réessayer."
  armyForgeExportFailed: "Army Forge n'a pas pu exporter la liste. Désolé !"
  fetchCommonRulesFailed: "Échec du chargement des règles communes. Désolé !"
