tutorial:
  header: "Guide / Tutoriel"
  instructions:
    item1: "Construisez votre armée dans OPR's Army Forge."
    item2: 'Cliquez sur le menu en haut à droite et sélectionnez "Share as Link".'
    item3: "Collez ce lien dans le champ ci-dessus."
    item4: 'Cliquez sur "Importer l''armée et générer les définitions" ci-dessus.'
    item5: "L'application va alors créer une définition de modèle pour chaque unité de votre armée."
    item6: "À vous ensuite d'assigner les quantités d'équipements à chaque modèle, selon l'armée souhaitée :"
    item6a: "Modifiez la quantité d'un équipement à l'aide des champs de gauche."
    item6b: "Cochez la case à côté de la quantité d'un équipement pour que son nom apparaisse dans le nom TTS du modèle."
    item6c: 'Dupliquez n''importe quelle définition de modèle via le bouton "Dupliquer cette définition de modèle".'
    # <0> = lien vers le mod TTS
    item7: 'Une fois terminé, cliquez sur "Générer un lien partageable pour TTS" en bas de page, puis collez cette URL dans <0>le mod TTS</0>.'
  hint:
    label: "Astuce"
    text: 'Utilisez les options de "TTS Output Configuration" ci-dessous pour ajuster ce qui apparaît dans les champs nom et description de chaque modèle dans TTS.'

outputOptions:
  header: "Configuration de la sortie TTS"
  rules:
    includeCoreSpecialRules:
      name: 'Inclure les règles spéciales "Core" dans la description du modèle'
      label: "Si activé, les descriptions TTS incluront les règles spéciales de base pertinentes pour le modèle."
    includeFullCoreSpecialRulesText:
      name: "Inclure le texte complet des règles spéciales de base"
      label: "Si activé, les descriptions TTS incluront le texte complet des règles spéciales de base. Sinon, seul le nom de la règle sera affiché."
    includeArmySpecialRules:
      name: 'Inclure les règles spéciales "Army" dans la description du modèle'
      label: "Si activé, les descriptions TTS incluront les règles de l'armée et de l'équipement du modèle."
    includeFullArmySpecialRulesText:
      name: "Inclure le texte complet des règles spéciales d'armée"
      label: "Si activé, les descriptions TTS incluront le texte complet des règles spéciales d'armée. Sinon, seul le nom de la règle sera affiché."
    includeWeaponsListInName:
      name: "Inclure la liste des équipements dans le nom du modèle"
      label: 'Si activé, la sortie "nom" TTS inclura une liste d''équipements séparée par des virgules et colorée sous le nom du modèle.'
    includeSpecialRulesListInName:
      name: "Inclure la liste des règles spéciales dans le nom du modèle"
      label: 'Si activé, la sortie "nom" TTS inclura une liste des règles spéciales séparée par des virgules et colorée sous le nom du modèle.'
    swapCustomName:
      name: "Inverser l'ordre du nom personnalisé et du nom d'origine pour les unités à plusieurs modèles"
      label: "Si activé, une unité avec un nom personnalisé et plus d'un modèle d'origine affichera le nom personnalisé entre parenthèses au lieu du nom d'origine. C'est souvent plus lisible et plus logique."
    replaceOriginalName:
      name: "Remplacer complètement le nom d'origine par le nom personnalisé"
      label: "Si activé, une unité avec un nom personnalisé verra ce nom remplacer entièrement l'original, sans parenthèses ni ailleurs dans le modèle."
    disableSmallText:
      name: "Désactiver le texte en petit"
      label: "Si activé, aucun texte du nom ou de la description ne sera en petit. Activez cette option si vous avez du mal à lire le petit texte dans TTS."
    includeCampaignTraits:
      name: "Inclure les traits de campagne dans la description du modèle"
      label: "Si activé, la description TTS inclura chacun des traits de campagne du modèle (Compétences, Traits, Blessures, Talents). C'est l'interrupteur principal — les sous-catégories ci-dessous et les cases à cocher par trait affinent la sortie."
    includeCampaignTraitsFullText:
      name: "Inclure le texte complet des traits de campagne"
      label: "Si activé, la description TTS inclura le texte complet de chaque trait de campagne. Sinon, seul le nom du trait sera affiché."
    includeCampaignSkillSets:
      name: "Inclure les Compétences de campagne"
      label: "Si activé, les traits de campagne de la catégorie Compétences (p. ex. Suppressor, Prowler) sont inclus dans la description du modèle."
    includeCampaignTraitsCategory:
      name: "Inclure les Traits de campagne"
      label: "Si activé, les traits de campagne de la catégorie Traits (p. ex. Agile, Resilient) sont inclus dans la description du modèle."
    includeCampaignInjuries:
      name: "Inclure les Blessures de campagne"
      label: "Si activé, les blessures de campagne (p. ex. Blinded Eye, Chest Wound) sont incluses dans la description du modèle."
    includeCampaignTalents:
      name: "Inclure les Talents de campagne"
      label: "Si activé, les talents de campagne (p. ex. Natural Talent) sont inclus dans la description du modèle."
    includeCampaignXp:
      name: "Inclure l'XP de campagne dans la description du modèle"
      label: "Si activé, la description TTS se termine par l'XP de campagne actuelle du modèle. Les modèles avec 0 XP n'ont aucune ligne ajoutée."
  colours:
    quality:
      name: "Couleur de la qualité du modèle"
      label: "Code HEX pour la valeur de qualité du modèle dans la sortie TTS."
    defense:
      name: "Couleur de la défense du modèle"
      label: "Code HEX pour la valeur de défense du modèle dans la sortie TTS."
    loadout:
      name: "Couleur de l'équipement du modèle"
      label: "Code HEX pour les détails d'équipement du modèle dans la sortie TTS."
    specialRules:
      name: "Couleur des règles spéciales du modèle"
      label: "Code HEX pour les détails des règles spéciales du modèle dans la sortie TTS."
    tough:
      name: "Couleur de la valeur Tough du modèle"
      label: "Code HEX pour la valeur Tough du modèle, le cas échéant, dans la sortie TTS."
    campaign:
      name: "Couleur des éléments de campagne"
      label: "Code HEX pour les traits de campagne et l'XP de campagne du modèle dans la sortie TTS."
  saveLoad:
    header: "Enregistrer et charger les configurations TTS"
    description: "Enregistrez toute la configuration ci-dessus dans le stockage local de votre navigateur en cliquant sur le bouton ci-dessous. Vous pourrez ensuite rapidement charger différentes configurations."
    saveButton: "Enregistrer la configuration actuelle"
    loadDefaultButton: "Charger la configuration par défaut"
    loadCustomHeader: "Charger des configurations personnalisées"
    loadConfigButton: "Charger la configuration"
    emptyState: "Aucune configuration TTS enregistrée"

outputFaq:
  header: "Notes sur la sortie TTS"
  unitUpgradesNote: 'Les améliorations qui s''appliquent à des unités entières (comme les améliorations "Musician" dans Age of Fantasy) sont listées ici comme des équipements individuels. Ce n''est pas techniquement parfait, mais c''est le meilleur compromis et cela offre le plus de flexibilité.'

maintenance:
  heading: "OPR Army Forge vers TTS est en maintenance !"
  body: "Le site est en cours de travaux, merci de revenir bientôt !"

errors:
  noArmyId: "Impossible de trouver l'identifiant d'armée Army Forge. Veuillez vérifier votre lien de partage Army Forge et réessayer."
  armyForgeExportFailed: "Army Forge n'a pas pu exporter la liste. Désolé !"
  fetchCommonRulesFailed: "Échec du chargement des règles communes. Désolé !"
