    tldr: 'En bref : rendez-vous sur <0>Army Forge</0> → votre liste d''armée → menu en haut à droite → cliquez sur "Share as Link" → collez ce lien dans le champ ci-dessous → Vérifiez les définitions des figurines → cliquez sur "Generate shareable link for TTS" en bas de la page → collez <em>cet</em> URL dans <1>ce mod</1>'
    placeholder: "https://army-forge.onepagerules.com/share?id=XXX&name=XXX"
  importArmyButton: "Importer l'armée et générer les définitions"
